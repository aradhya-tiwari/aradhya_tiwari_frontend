<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VRS - My Bookings</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <header>
        <nav class="bg-blue-400 text-white p-4 flex justify-between">
            <h1 class="text-xl font-bold">VRS - My Bookings</h1>
            <div class="flex gap-2">
                <a href="app.html" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded">Dashboard</a>
                <a href="vehicles.html" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded">Available Vehicles</a>
                <button onclick="handleLogout()" class="bg-red-500 hover:bg-red-700 px-4 py-2 rounded">Logout</button>
            </div>
        </nav>
    </header>

    <main class="p-8">
        <div class="flex items-center justify-between mb-4">
            <h2 class="text-2xl font-semibold">My Bookings</h2>
            <button onclick="loadMyBookings()"
                class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Refresh</button>
        </div>
        <p id="myBookingStatus" class="mb-4 text-sm text-gray-600">Loading bookings...</p>
        <div id="myBookingList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </main>

    <script src="scripts/authService.js"></script>
    <script src="scripts/apiService.js"></script>
    <script src="scripts/bookings.js"></script>
</body>

</html>
