<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VRS - My Bookings</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-slate-50 min-h-screen">
    <header>
        <nav class="bg-indigo-700 text-white p-4 shadow-lg flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tight">VRS - My Bookings</h1>
            <div class="flex gap-3">
                <a href="app.html"
                    class="bg-indigo-500 hover:bg-indigo-600 px-4 py-2 rounded-lg transition duration-200 text-sm font-medium">Dashboard</a>
                <a href="vehicles.html"
                    class="bg-indigo-500 hover:bg-indigo-600 px-4 py-2 rounded-lg transition duration-200 text-sm font-medium">Browse
                    Vehicles</a>
                <button onclick="handleLogout()"
                    class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded-lg transition duration-200 text-sm font-medium">Logout</button>
            </div>
        </nav>
    </header>

    <main class="p-8 max-w-7xl mx-auto">
        <div class="flex items-center justify-between mb-8">
            <div>
                <h2 class="text-3xl font-bold text-slate-900">My Bookings</h2>
                <p class="text-slate-600 text-sm mt-1">Track and manage your vehicle reservations</p>
            </div>
            <div class="flex gap-3">
                <button onclick="loadMyBookings()"
                    class="bg-slate-600 hover:bg-slate-700 text-white px-5 py-2 rounded-lg transition duration-200 font-medium shadow-md hover:shadow-lg">
                    Refresh
                </button>
            </div>
        </div>

        <p id="myBookingStatus" class="mb-6 p-3 rounded-lg text-sm text-slate-700 bg-slate-200">Loading bookings...</p>
        <div id="myBookingList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </main>



    <script src="scripts/authService.js"></script>
    <script src="scripts/apiService.js"></script>
    <script src="scripts/bookings.js"></script>
</body>

</html>
