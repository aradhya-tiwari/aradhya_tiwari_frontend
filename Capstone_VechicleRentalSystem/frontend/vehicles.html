<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capstone VRS - Available Vehicles</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-slate-50 min-h-screen">
    <header>
        <nav class="bg-indigo-700 text-white p-4 shadow-lg flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tight"> Capstone VRS - Browse Vehicles</h1>
            <div class="flex gap-3">
                <a href="app.html"
                    class="bg-indigo-500 hover:bg-indigo-600 px-4 py-2 rounded-lg transition duration-200 text-sm font-medium">Dashboard</a>
                <a href="bookings.html"
                    class="bg-indigo-500 hover:bg-indigo-600 px-4 py-2 rounded-lg transition duration-200 text-sm font-medium">My
                    Bookings</a>
                <button onclick="handleLogout()"
                    class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded-lg transition duration-200 text-sm font-medium">Logout</button>
            </div>
        </nav>
    </header>

    <main class="p-8 max-w-7xl mx-auto">
        <section>
            <div class="flex items-center justify-between mb-8">
                <div>
                    <h3 class="text-3xl font-bold text-slate-900">Available Vehicles</h3>
                    <p class="text-slate-600 text-sm mt-1">Select and book your perfect ride</p>
                </div>
                <button onclick="loadVehicles()"
                    class="bg-slate-600 hover:bg-slate-700 text-white px-5 py-2 rounded-lg transition duration-200 font-medium shadow-md hover:shadow-lg">
                    Refresh
                </button>
            </div>

            <!-- Filter Section -->
            <div class="bg-white rounded-xl shadow-md p-6 mb-8 border border-slate-200">
                <h4 class="text-lg font-semibold text-slate-900 mb-4">Filter Vehicles</h4>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">Search (Name/Reg)</label>
                        <input id="vehicleSearch" type="text" placeholder="Search vehicles..."
                            class="w-full border border-slate-300 rounded-lg px-3 py-2 bg-white focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">Vehicle Type</label>
                        <select id="vehicleTypeFilter"
                            class="w-full border border-slate-300 rounded-lg px-3 py-2 bg-white focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
                            <option value="all">All Types</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2"> Price (Rs/day)</label>
                        <input id="vehicleMaxPrice" type="number" placeholder="0" min="0"
                            class="w-full border border-slate-300 rounded-lg px-3 py-2 bg-white focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
                    </div>
                    </button>
                </div>
            </div>
            </div>

            <p id="vehicleStatus" class="mb-6 p-3 rounded-lg text-sm text-slate-700 bg-slate-200">Loading vehicles...
            </p>
            <div id="vehicleList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>
    </main>

    <div id="checkoutModal" class="hidden fixed inset-0 z-50 bg-black/50 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-4xl max-h-[90vh] overflow-hidden">
            <div class="p-6 border-b border-slate-200 flex items-center justify-between bg-slate-100">
                <div>
                    <h3 id="checkoutModalTitle" class="text-2xl font-bold text-slate-900">Checkout</h3>
                    <p id="checkoutVehicleSummary" class="text-sm text-slate-600 mt-1"></p>
                </div>
                <button onclick="closeCheckoutModal()"
                    class="bg-slate-200 hover:bg-slate-300 text-slate-900 px-3 py-1 rounded-lg transition duration-200">Close</button>
            </div>

            <div class="p-6 grid grid-cols-1 lg:grid-cols-2 gap-6 max-h-[70vh] overflow-hidden">
                <section>
                    <div class="mb-4 flex items-center justify-between">
                        <h4 class="text-lg font-semibold text-slate-900">Existing Bookings</h4>
                        <p class="text-sm text-slate-600">Count: <span id="checkoutBookingCount"
                                class="font-semibold">0</span></p>
                    </div>
                    <p id="checkoutBookingStatus" class="mb-3 text-sm text-slate-600">Loading bookings...</p>
                    <div id="checkoutBookingList" class="space-y-3 max-h-[50vh] overflow-y-auto pr-2"></div>
                </section>

                <section class="bg-slate-100 rounded-xl p-6 border border-slate-200">
                    <h4 class="text-lg font-semibold text-slate-900 mb-4">Select Dates</h4>
                    <div class="grid grid-cols-1 gap-3">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Start Date</label>
                            <input id="checkoutStartDate" type="date"
                                class="w-full border border-slate-300 rounded-lg px-3 py-2 bg-white focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">End Date</label>
                            <input id="checkoutEndDate" type="date"
                                class="w-full border border-slate-300 rounded-lg px-3 py-2 bg-white focus:ring-2 focus:ring-indigo-500 focus:border-transparent">
                        </div>
                    </div>

                    <div class="mt-6 bg-white rounded-lg p-4 border border-slate-200">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-sm text-slate-700">Days:</span>
                            <span id="checkoutDays" class="text-lg font-semibold text-slate-900">0</span>
                        </div>
                        <div class="flex justify-between items-center mb-3">
                            <span class="text-sm text-slate-700">Price/Day:</span>
                            <span id="checkoutRate" class="text-lg font-semibold text-indigo-600">₹0</span>
                        </div>
                        <div class="border-t border-slate-200 pt-3">
                            <div class="flex justify-between items-center">
                                <span class="text-base font-semibold text-slate-900">Total:</span>
                                <span id="checkoutAmount" class="text-2xl font-bold text-green-600">₹0</span>
                            </div>
                        </div>
                    </div>

                    <p id="checkoutMessage" class="mt-4 text-sm"></p>

                    <div class="mt-6 flex gap-3">
                        <button onclick="createBooking()"
                            class="flex-1 bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg transition duration-200 font-medium shadow-md hover:shadow-lg">
                            Book Vehicle
                        </button>
                        <button onclick="bookAnotherVehicle()"
                            class="flex-1 bg-slate-600 hover:bg-slate-700 text-white px-4 py-2 rounded-lg transition duration-200 font-medium">
                            + Book Another
                        </button>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <script src="scripts/authService.js"></script>
    <script src="scripts/apiService.js"></script>
    <script src="scripts/vehicles.js"></script>
</body>

</html>
