<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VRS - Available Vehicles</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <header>
        <nav class="bg-blue-400 text-white p-4 flex justify-between">
            <h1 class="text-xl font-bold">VRS - Available Vehicles</h1>
            <div class="flex gap-2">
                <a href="app.html" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded">Dashboard</a>
                <a href="bookings.html" class="bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded">My Bookings</a>
                <button onclick="handleLogout()" class="bg-red-500 hover:bg-red-700 px-4 py-2 rounded">Logout</button>
            </div>
        </nav>
    </header>

    <main class="p-8">


        <section>
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-2xl font-semibold">Available Vehicles</h3>
                <button onclick="loadVehicles()"
                    class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Refresh</button>
            </div>

            <p id="vehicleStatus" class="mb-4 text-sm text-gray-600">Loading vehicles...</p>
            <div id="vehicleList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </section>
    </main>

    <div id="checkoutModal" class="hidden fixed inset-0 z-50 bg-black/50 items-center justify-center p-4">
        <div class="bg-white rounded-lg shadow-xl w-full max-w-4xl max-h-[90vh] overflow-hidden">
            <div class="p-4 border-b flex items-center justify-between">
                <div>
                    <h3 id="checkoutModalTitle" class="text-xl font-semibold">Checkout</h3>
                    <p id="checkoutVehicleSummary" class="text-sm text-gray-600 mt-1"></p>
                </div>
                <button onclick="closeCheckoutModal()"
                    class="bg-gray-200 hover:bg-gray-300 px-3 py-1 rounded">Close</button>
            </div>

            <div class="p-4 grid grid-cols-1 lg:grid-cols-2 gap-6 max-h-[80vh] overflow-hidden">
                <section>
                    <div class="mb-4 flex items-center justify-between">
                        <h4 class="text-lg font-semibold">Vehicle Bookings</h4>
                        <p class="text-sm text-gray-600">Count: <span id="checkoutBookingCount">0</span></p>
                    </div>
                    <p id="checkoutBookingStatus" class="mb-3 text-sm text-gray-600">Loading bookings...</p>
                    <div id="checkoutBookingList" class="space-y-3 max-h-[55vh] overflow-y-auto pr-2"></div>
                </section>

                <section class="border border-gray-200 rounded-lg p-4 bg-gray-50">
                    <h4 class="text-lg font-semibold mb-4">Select Dates</h4>
                    <div class="grid grid-cols-1 gap-3">
                        <input id="checkoutStartDate" type="date" class="border rounded px-3 py-2 bg-white">
                        <input id="checkoutEndDate" type="date" class="border rounded px-3 py-2 bg-white">
                    </div>
                    <div class="mt-4 border rounded-lg p-3 bg-white">
                        <p class="text-sm text-gray-700">Days: <span id="checkoutDays">0</span></p>
                        <p class="text-sm text-gray-700">Price / Day: INR <span id="checkoutRate">0</span></p>
                        <p class="text-base font-semibold text-gray-900 mt-1">Final Amount: INR <span
                                id="checkoutAmount">0</span></p>
                    </div>
                    <p id="checkoutMessage" class="mt-3 text-sm"></p>
                    <div class="mt-4 flex flex-wrap gap-3">
                        <button onclick="createBooking()"
                            class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Book Vehicle</button>
                        <button onclick="bookAnotherVehicle()"
                            class="bg-gray-200 text-gray-800 px-4 py-2 rounded hover:bg-gray-300">Book Another
                            Vehicle</button>
                    </div>
                </section>
            </div>
        </div>
    </div>

    <script src="scripts/authService.js"></script>
    <script src="scripts/apiService.js"></script>
    <script src="scripts/vehicles.js"></script>
</body>

</html>
