<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capstone VRS - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100">
    <div class="min-h-screen flex items-center justify-center py-12 px-4">
        <div class="max-w-md w-full bg-white rounded-lg shadow-lg p-8">
            <h1 class="text-3xl font-bold text-center text-gray-900 mb-2">VRS</h1>
            <p class="text-center text-gray-600 mb-8">Capstone VRS</p>

            <!-- Login Form -->
            <div id="loginDiv">
                <h2 class="text-xl font-semibold mb-4">Login</h2>
                <form onsubmit="handleLogin(event)" class="space-y-4">
                    <input type="email" id="loginEmail" placeholder="Email" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <input type="password" id="loginPassword" placeholder="Password" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <button type="submit"
                        class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold hover:bg-blue-700 transition">Login</button>
                </form>
                <p class="text-center mt-4 text-sm"><a href="#" onclick="switchToSignup()"
                        class="text-blue-600 hover:underline">Create Account</a></p>
                <div id="loginMessage" class="mt-4 text-center text-sm"></div>
            </div>

            <!-- Signup Form -->
            <div id="signupDiv" class="hidden">
                <h2 class="text-xl font-semibold mb-4">Sign Up</h2>
                <form onsubmit="handleSignup(event)" class="space-y-4">
                    <input type="text" id="signupName" placeholder="Full Name" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <input type="email" id="signupEmail" placeholder="Email" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <input type="password" id="signupPassword" placeholder="Password (min 6 chars)" minlength="6"
                        required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <button type="submit"
                        class="w-full bg-green-600 text-white py-2 rounded-lg font-semibold hover:bg-green-700 transition">Sign
                        Up</button>
                </form>
                <p class="text-center mt-4 text-sm"><a href="#" onclick="switchToLogin()"
                        class="text-blue-600 hover:underline">Already have an account?</a></p>
                <div id="signupMessage" class="mt-4 text-center text-sm"></div>
            </div>
        </div>
    </div>

    <script src="scripts/authService.js"></script>
    <script src="scripts/apiService.js"></script>
    <script src="scripts/index.js"></script>
</body>

</html>
