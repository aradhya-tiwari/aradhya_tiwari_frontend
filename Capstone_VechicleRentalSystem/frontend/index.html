<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VRS - Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-gray-100">
    <div class="min-h-screen flex items-center justify-center py-12 px-4">
        <div class="max-w-md w-full bg-white rounded-lg shadow-lg p-8">
            <h1 class="text-3xl font-bold text-center text-gray-900 mb-2">VRS</h1>
            <p class="text-center text-gray-600 mb-8">Vehicle Rental System</p>

            <!-- Login Form -->
            <div id="loginDiv">
                <h2 class="text-xl font-semibold mb-4">Login</h2>
                <form onsubmit="handleLogin(event)" class="space-y-4">
                    <input type="email" id="loginEmail" placeholder="Email" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <input type="password" id="loginPassword" placeholder="Password" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <button type="submit"
                        class="w-full bg-blue-600 text-white py-2 rounded-lg font-semibold hover:bg-blue-700 transition">Login</button>
                </form>
                <p class="text-center mt-4 text-sm"><a href="#" onclick="switchToSignup()"
                        class="text-blue-600 hover:underline">Create Account</a></p>
                <div id="loginMessage" class="mt-4 text-center text-sm"></div>
            </div>

            <!-- Signup Form -->
            <div id="signupDiv" class="hidden">
                <h2 class="text-xl font-semibold mb-4">Sign Up</h2>
                <form onsubmit="handleSignup(event)" class="space-y-4">
                    <input type="text" id="signupName" placeholder="Full Name" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <input type="email" id="signupEmail" placeholder="Email" required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <input type="password" id="signupPassword" placeholder="Password (min 6 chars)" minlength="6"
                        required
                        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <button type="submit"
                        class="w-full bg-green-600 text-white py-2 rounded-lg font-semibold hover:bg-green-700 transition">Sign
                        Up</button>
                </form>
                <p class="text-center mt-4 text-sm"><a href="#" onclick="switchToLogin()"
                        class="text-blue-600 hover:underline">Already have an account?</a></p>
                <div id="signupMessage" class="mt-4 text-center text-sm"></div>
            </div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:8080/api/users';

        // Switch to signups, hides loginDiv (add hidden) and shows signupDiv (removed hidden)
        function switchToSignup() {
            document.getElementById('loginDiv').classList.add('hidden');
            document.getElementById('signupDiv').classList.remove('hidden');
        }
        // Switch to login, hides signupDiv and shows loginDiv
        function switchToLogin() {
            document.getElementById('loginDiv').classList.remove('hidden');
            document.getElementById('signupDiv').classList.add('hidden');
        }

        // Requests API/login (POST), if res.ok, msg content = "success" else "failed"
        async function handleLogin(e) {
            e.preventDefault();
            const msg = document.getElementById('loginMessage');
            try {
                const res = await fetch(`${API}/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('loginEmail').value,
                        password: document.getElementById('loginPassword').value
                    })
                });
                const data = await res.json();
                if (res.ok) {
                    msg.textContent = ' Login successful!';
                    msg.className = 'mt-4 text-center text-sm text-green-600';
                } else {
                    msg.textContent = data.message || 'Login failed';
                    msg.className = 'mt-4 text-center text-sm text-red-600';
                }
            } catch (err) {
                msg.textContent = 'Error: ' + err.message;
                msg.className = 'mt-4 text-center text-sm text-red-600';
            }
        }

        // Signup, requests API/signup
        async function handleSignup(e) {
            e.preventDefault();
            const msg = document.getElementById('signupMessage');
            try {
                const res = await fetch(`${API}/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        fullName: document.getElementById('signupName').value,
                        email: document.getElementById('signupEmail').value,
                        password: document.getElementById('signupPassword').value,
                        role: 'USER' // current only signing as User, will add radio button for user and Admin later
                    })
                });
                const data = await res.json();
                // 201 -> entry added, change msg content
                if (res.status === 201) {
                    msg.textContent = ' Account created! Switching to login...';
                    msg.className = 'mt-4 text-center text-sm text-green-600';
                    setTimeout(switchToLogin, 1500);
                } else {
                    msg.textContent = data.message || 'Signup failed';
                    msg.className = 'mt-4 text-center text-sm text-red-600';
                }
            } catch (err) {
                msg.textContent = 'Error: ' + err.message;
                msg.className = 'mt-4 text-center text-sm text-red-600';
            }
        }
    </script>
</body>

</html>
