<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Bookings</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <header>
        <nav class="bg-red-300 text-white p-4 flex justify-between">
            <h1 class="text-xl font-bold">VRS - Admin Bookings</h1>
            <div class="flex gap-2">
                <a href="admin.html" class="bg-indigo-600 hover:bg-indigo-700 px-4 py-2 rounded">Manage Vehicles</a>
                <button onclick="handleLogout()" class="bg-red-500 hover:bg-red-700 px-4 py-2 rounded">Logout</button>
            </div>
        </nav>
    </header>

    <main class="p-8">
        <div class="flex items-center justify-between mb-4">
            <h2 class="text-2xl font-semibold">All Bookings</h2>
            <button onclick="loadAllBookings()"
                class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">Refresh</button>
        </div>

        <p id="adminBookingStatus" class="mb-4 text-sm text-gray-600">Loading bookings...</p>
        <div id="adminBookingList" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </main>

    <script src="scripts/authService.js"></script>
    <script src="scripts/apiService.js"></script>
    <script src="scripts/admin-bookings.js"></script>
</body>

</html>
