<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Area</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body class="bg-slate-50 min-h-screen">
    <header>
        <nav class="bg-red-700 text-white p-4 shadow-lg flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tight">VRS Admin Dashboard</h1>
            <div class="flex gap-3">
                <a href="admin-bookings.html"
                    class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded-lg transition duration-200 text-sm font-medium">View
                    Bookings</a>
                <button onclick="handleLogout()"
                    class="bg-red-700 hover:bg-red-800 px-4 py-2 rounded-lg transition duration-200 text-sm font-medium">Logout</button>
            </div>
        </nav>
    </header>

    <main class="p-8 max-w-7xl mx-auto">
        <div class="mb-8">
            <h2 class="text-3xl font-bold text-slate-900">Admin Dashboard</h2>
            <p class="text-slate-600 mt-2">
                <span class="text-lg">Welcome, <span id="adminName"
                        class="font-semibold text-purple-600"></span>!</span>
            </p>
            <p class="text-slate-600 mt-1">
                <span class="inline-block px-3 py-1 rounded-full bg-purple-100 text-purple-800 text-sm font-semibold">
                    Role: <span id="adminRole"></span>
                </span>
            </p>
        </div>

        <section class="bg-white rounded-xl shadow-md border border-slate-100 p-8 mb-8">
            <h3 class="text-2xl font-bold mb-6 text-slate-900" id="formTitle">Add New Vehicle</h3>
            <form id="vehicleForm" class="grid grid-cols-1 md:grid-cols-2 gap-4" onsubmit="handleVehicleSubmit(event)">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Vehicle Name</label>
                    <input id="vehicleName" type="text" placeholder="e.g., Honda Civic" required
                        class="w-full px-3 py-2 border border-slate-300 rounded-lg bg-white focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Vehicle Type</label>
                    <select id="vehicleType" required
                        class="w-full px-3 py-2 border border-slate-300 rounded-lg bg-white focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                        <option value="">Select Type</option>
                        <option value="CAR">CAR</option>
                        <option value="BIKE">BIKE</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Registration Number</label>
                    <input id="registrationNumber" type="text" placeholder="e.g., MP-09 5186" required
                        class="w-full px-3 py-2 border border-slate-300 rounded-lg bg-white focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Price Per Day (₹)</label>
                    <input id="pricePerDay" type="number" min="1" placeholder="e.g., 500" required
                        class="w-full px-3 py-2 border border-slate-300 rounded-lg bg-white focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                </div>

                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-slate-700 mb-1">Image URL (optional)</label>
                    <input id="imgUrl" type="url" placeholder="https://example.com/image.jpg"
                        class="w-full px-3 py-2 border border-slate-300 rounded-lg bg-white focus:ring-2 focus:ring-purple-500 focus:border-transparent">
                </div>

                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-slate-700 mb-1">Basic Details</label>
                    <textarea id="basicDetails" placeholder="Describe the vehicle features..." rows="3"
                        class="w-full px-3 py-2 border border-slate-300 rounded-lg bg-white focus:ring-2 focus:ring-purple-500 focus:border-transparent resize-none"></textarea>
                </div>


                <div class="md:col-span-1 flex gap-3 pt-2">
                    <label class="flex items-center gap-2 p-2 w-full rounded-lg bg-slate-50 border border-slate-200">
                        <input id="isActive" type="checkbox" checked class="w-4 h-4">
                        <span class="text-slate-700 font-medium">Active</span>
                    </label>
                </div>
                <div class="md:col-span-1 flex gap-3 pt-2">
                    <button id="submitBtn" type="submit"
                        class="flex-1 bg-purple-600 hover:bg-purple-700 text-white px-4 py-3 rounded-lg transition duration-200 font-semibold shadow-md hover:shadow-lg">
                        Add Vehicle
                    </button>
                    <button id="cancelEditBtn" type="button" onclick="cancelEdit()"
                        class="hidden flex-1 bg-slate-500 hover:bg-slate-600 text-white px-4 py-3 rounded-lg transition duration-200 font-semibold">
                        Cancel Edit
                    </button>
                </div>
            </form>
            <p id="formMessage" class="mt-4 text-sm font-medium"></p>
        </section>

        <section>
            <div class="flex items-center justify-between mb-6">
                <div>
                    <h3 class="text-2xl font-bold text-slate-900">All Vehicles</h3>
                    <p class="text-slate-600 text-sm mt-1">Manage your vehicle fleet</p>
                </div>
                <button onclick="loadVehicles()"
                    class="bg-slate-600 hover:bg-slate-700 text-white px-5 py-2 rounded-lg transition duration-200 font-medium shadow-md hover:shadow-lg">Refresh</button>
            </div>
            <p id="listMessage" class="mb-6 p-3 rounded-lg text-sm text-slate-700 bg-slate-200">Loading vehicles...</p>
            <div id="vehicleList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </section>
    </main>
    <footer></footer>

    <script src="scripts/authService.js"></script>
    <script src="scripts/apiService.js"></script>
    <script src="scripts/admin.js"></script>
</body>

</html>
