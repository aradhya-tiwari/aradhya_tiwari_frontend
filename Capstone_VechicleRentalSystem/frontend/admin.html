<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Area</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>
    <header>
        <nav class="bg-red-300 text-white p-4 flex justify-between">
            <h1 class="text-xl font-bold">VRS - Admin Dashboard</h1>
            <div class="flex gap-2">
                <a href="admin-bookings.html" class="bg-indigo-600 hover:bg-indigo-700 px-4 py-2 rounded">View
                    Bookings</a>
                <button onclick="handleLogout()" class="bg-red-500 hover:bg-red-700 px-4 py-2 rounded">Logout</button>
            </div>
        </nav>
    </header>
    <main class="p-8">
        <h2 class="text-2xl font-bold">Admin Dashboard</h2>
        <p class="mt-4">Welcome, <span id="adminName"></span>...</p>
        <p class="mt-2">Your role: <span id="adminRole"></span>...</p>
        <p class="mt-4 text-red-600">Unauthorized users cannot access this page.</p>

        <section class="mt-8 bg-white border rounded-lg p-6 shadow-sm">
            <h3 class="text-xl font-semibold mb-4" id="formTitle">Add Vehicle</h3>
            <form id="vehicleForm" class="grid grid-cols-1 md:grid-cols-2 gap-4" onsubmit="handleVehicleSubmit(event)">
                <input id="vehicleName" type="text" placeholder="Vehicle Name" required
                    class="w-full px-3 py-2 border rounded">

                <select id="vehicleType" required class="w-full px-3 py-2 border rounded">
                    <option value="">Select Type</option>
                    <option value="CAR">CAR</option>
                    <option value="BIKE">BIKE</option>
                </select>

                <input id="registrationNumber" type="text" placeholder="Registration Number" required
                    class="w-full px-3 py-2 border rounded">

                <input id="pricePerDay" type="number" min="1" placeholder="Price Per Day" required
                    class="w-full px-3 py-2 border rounded">

                <input id="imgUrl" type="url" placeholder="Image URL (optional)"
                    class="w-full px-3 py-2 border rounded">

                <textarea id="basicDetails" placeholder="Basic Details" rows="3"
                    class="md:col-span-2 w-full px-3 py-2 border rounded"></textarea>

                <label class="flex items-center gap-2">
                    <input id="availabilityStatus" type="checkbox" checked>
                    <span>Available</span>
                </label>

                <label class="flex items-center gap-2">
                    <input id="isActive" type="checkbox" checked>
                    <span>Active</span>
                </label>

                <div class="md:col-span-2 flex gap-3">
                    <button id="submitBtn" type="submit"
                        class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
                        Add Vehicle
                    </button>
                    <button id="cancelEditBtn" type="button" onclick="cancelEdit()"
                        class="hidden bg-gray-500 text-white px-4 py-2 rounded hover:bg-gray-600">
                        Cancel Edit
                    </button>
                </div>
            </form>
            <p id="formMessage" class="mt-3 text-sm"></p>
        </section>

        <section class="mt-8">
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-xl font-semibold">All Vehicles</h3>
                <button onclick="loadVehicles()"
                    class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600">Refresh</button>
            </div>
            <p id="listMessage" class="mb-4 text-sm text-gray-600">Loading vehicles...</p>
            <div id="vehicleList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
        </section>
    </main>
    <footer></footer>

    <script src="scripts/authService.js"></script>
    <script src="scripts/apiService.js"></script>
    <script src="scripts/admin.js"></script>
</body>

</html>
