<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Inventory Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>
    <div class="min-h-screen bg-slate-100 text-slate-900">
        <header class="border-b border-slate-200 bg-white shadow-sm">
            <div class="mx-auto flex max-w-6xl flex-col items-center gap-3 px-6 py-10 text-center">
                <h1 class="text-4xl font-bold tracking-tight text-slate-950 sm:text-5xl">
                    Product Inventory Dashboard
                </h1>
            </div>
        </header>
        <button onclick="clearLocalstorage()">Clear DB</button>
        <main class="mx-auto max-w-6xl px-6 py-8">
            <!-- Controller section to search ,filter and sort-->
            <section class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
                <div class="mb-4">
                    <h2 class="text-lg font-semibold text-slate-900">Controls</h2>
                    <p class="text-sm text-slate-600">Search, filter, and sort products.</p>
                </div>

                <div class="grid gap-4 md:grid-cols-2 xl:grid-cols-4">
                    <!-- for search bar -->
                    <label class="block">
                        <span class="mb-2 block text-sm font-medium text-slate-700">Search Product</span>
                        <input id="searchInput" type="text" placeholder="Type a product name"
                            class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm outline-none transition focus:border-slate-500">
                    </label>
                    <!-- Categories, will get it from products list itself by pushing them in a set -->
                    <label class="block">
                        <span class="mb-2 block text-sm font-medium text-slate-700">Category</span>
                        <select id="categoryFilter"
                            class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm outline-none transition focus:border-slate-500">
                            <option value="all">All Categories</option>
                        </select>
                    </label>
                    <!-- Default all stocks and low stock -->
                    <label class="block">
                        <span class="mb-2 block text-sm font-medium text-slate-700">Stock Filter</span>
                        <select id="stockFilter"
                            class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm outline-none transition focus:border-slate-500">
                            <option value="all">All Stock Levels</option>
                            <option value="low">Low Stock Only (less than 5)</option>
                        </select>
                    </label>
                    <!-- sort filter -->
                    <label class="block">
                        <span class="mb-2 block text-sm font-medium text-slate-700">Sort By</span>
                        <select id="sortFilter"
                            class="w-full rounded-lg border border-slate-300 bg-white px-3 py-2 text-sm outline-none transition focus:border-slate-500">
                            <option value="price-asc">Price: Low to High</option>
                            <option value="price-desc">Price: High to Low</option>
                            <option value="name-asc">Alphabetically A-Z</option>
                            <option value="name-desc">Alphabetically Z-A</option>
                        </select>
                    </label>
                </div>
            </section>

            <section class="mt-6">
                <div class="mb-4 flex items-center justify-between">
                    <h2 class="text-xl font-semibold text-slate-900">Products List
                    </h2>
                    <p id="resultsCount" class="text-sm text-slate-600">...</p>
                </div>

                <div class="flex gap-10">
                    <div id="productList"
                        class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3 w-[66%] border rounded-2xl min-h-[400px]">
                        <div class="col-span-3">
                            <!-- took it from flowbite -->
                            <svg aria-hidden="true" class="w-8 h-8 text-slate-400 animate-spin fill-slate-800"
                                viewBox="0 0 100 101" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M100 50.5908C100 78.2051 77.6142 100.591 50 100.591C22.3858 100.591 0 78.2051 0 50.5908C0 22.9766 22.3858 0.59082 50 0.59082C77.6142 0.59082 100 22.9766 100 50.5908ZM9.08144 50.5908C9.08144 73.1895 27.4013 91.5094 50 91.5094C72.5987 91.5094 90.9186 73.1895 90.9186 50.5908C90.9186 27.9921 72.5987 9.67226 50 9.67226C27.4013 9.67226 9.08144 27.9921 9.08144 50.5908Z"
                                    fill="currentColor" />
                                <path
                                    d="M93.9676 39.0409C96.393 38.4038 97.8624 35.9116 97.0079 33.5539C95.2932 28.8227 92.871 24.3692 89.8167 20.348C85.8452 15.1192 80.8826 10.7238 75.2124 7.41289C69.5422 4.10194 63.2754 1.94025 56.7698 1.05124C51.7666 0.367541 46.6976 0.446843 41.7345 1.27873C39.2613 1.69328 37.813 4.19778 38.4501 6.62326C39.0873 9.04874 41.5694 10.4717 44.0505 10.1071C47.8511 9.54855 51.7191 9.52689 55.5402 10.0491C60.8642 10.7766 65.9928 12.5457 70.6331 15.2552C75.2735 17.9648 79.3347 21.5619 82.5849 25.841C84.9175 28.9121 86.7997 32.2913 88.1811 35.8758C89.083 38.2158 91.5421 39.6781 93.9676 39.0409Z"
                                    fill="currentFill" />
                            </svg>
                            <span class="">Loading...</span>
                        </div>
                    </div>
                    <aside class="border bg-slate-50 shadow-md w-1/3 rounded-lg h-80 p-2">
                        <h1 class="text-center text-3xl pb-2">Insights</h1>
                        <div id="insights"></div>
                    </aside>
                </div>

                <p id="emptyState"
                    class="hidden rounded-2xl border border-slate-200 bg-white px-4 py-8 text-center text-slate-500">
                    No products match the selected filters.
                </p>
            </section>
            <section class=" mt-5 ">
                <form action="#" method="get"
                    class="bg-white w-[80%] max-w-6xl m-auto p-5 rounded-lg border flex flex-col gap-2 px-20">
                    <h1 class="text-xl font-semibold my-2">Add Products </h1>
                    <div>
                        Name: <input type="text" name="pName" id="pName"
                            class="border px-2 rounded-md py-1 w-full m-auto" required>
                    </div>
                    <div>
                        Price: <input type="number" name="pPrice" id="pPrice"
                            class="border rounded-md py-1 px-2 w-full m-auto" required>
                    </div>
                    <div>
                        Quantity: <input type="number" name="pStock" id="pStock"
                            class="border rounded-md py-1 px-2 w-full m-auto" required> <br>
                    </div>
                    <div>
                        Category:
                        <input type="text" name="pCategory" id="pCategory"
                            class="border rounded-md py-1 px-2 w-full m-auto" required> <br>

                    </div>
                    <input type="submit" value="Submit" onclick="addProduct()"
                        class="bg-blue-300 rounded-lg text-white py-2 hover:shadow-lg transition-all active:border-2">
                </form>
            </section>
        </main>
    </div>
    <script src="./script.js"></script>
</body>

</html>
